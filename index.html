<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Empire Shadow System - V24</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Tajawal:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blood: #8b0000;
    --blood2: #6b0000;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --darker: #050002;
    --dark: #0a0005;
    --surface: #0f0008;
    --border: #3a1a00;
    --green: #00ff41;
    --dim: #5a4a30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--darker);
    color: #d4c4a0;
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse 70% 40% at 50% 0%, rgba(139,0,0,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 0% 100%, rgba(201,168,76,0.04) 0%, transparent 50%);
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 28px 20px 20px;
    border: 1px solid var(--blood);
    background: linear-gradient(180deg, rgba(139,0,0,0.12) 0%, transparent 100%);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blood), transparent);
  }
  .header h2 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 22px;
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
  }
  .header p {
    color: var(--dim);
    font-size: 12px;
    margin-top: 6px;
    letter-spacing: 2px;
  }
  .corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .corner-tl { top: 6px; right: 6px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 6px; left: 6px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 6px; right: 6px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 6px; left: 6px; border-width: 0 1px 1px 0; }

  /* ── Input ── */
  .input-wrap {
    border: 1px solid var(--border);
    background: var(--dark);
    position: relative;
  }
  .input-label {
    padding: 6px 14px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }
  textarea {
    width: 100%;
    height: 150px;
    background: #000;
    color: var(--green);
    border: none;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    outline: none;
    resize: vertical;
  }
  textarea::placeholder { color: #1a3a1a; }

  /* ── Button row ── */
  .btn-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  @media (max-width: 600px) { .btn-row { grid-template-columns: repeat(3, 1fr); } }

  button {
    background: #000;
    color: var(--gold);
    border: 1px solid #3a2800;
    padding: 11px 6px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    transition: all .18s;
    position: relative;
    overflow: hidden;
  }
  button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(201,168,76,0.05) 100%);
    opacity: 0;
    transition: opacity .2s;
  }
  button:hover { background: var(--blood2); color: #fff; border-color: var(--blood); }
  button:hover::before { opacity: 1; }
  button:active { transform: scale(.97); }

  .btn-assembly {
    border-color: var(--gold) !important;
    color: var(--gold2) !important;
    background: rgba(201,168,76,0.06) !important;
    font-weight: 700 !important;
  }
  .btn-assembly:hover { background: rgba(201,168,76,0.15) !important; box-shadow: 0 0 16px rgba(201,168,76,0.2); }

  .btn-danger { border-color: var(--blood) !important; color: #ff4444 !important; }
  .btn-danger:hover { background: var(--blood) !important; color: #fff !important; }

  /* ── Panels ── */
  .panel {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 8px;
    padding: 12px;
    border: 1px solid var(--blood2);
    background: rgba(139,0,0,0.06);
    animation: slideDown .2s ease;
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .panel.open { display: grid; }

  /* ── Assembly panel (تركيب) ── */
  #assembly-panel {
    display: none;
    flex-direction: column;
    gap: 14px;
    border: 1px solid var(--gold);
    background: rgba(201,168,76,0.03);
    padding: 16px;
    animation: slideDown .25s ease;
  }
  #assembly-panel.open { display: flex; }

  .asm-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .asm-title {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 2px;
  }
  .tabs {
    display: flex;
    gap: 6px;
  }
  .tab {
    padding: 5px 14px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    letter-spacing: 1px;
    transition: all .15s;
  }
  .tab.active { background: rgba(139,0,0,0.3); border-color: var(--blood); color: #d4a0a0; }

  .asm-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) { .asm-grid { grid-template-columns: 1fr; } }

  .asm-field {
    border: 1px solid var(--border);
    background: var(--dark);
    display: flex;
    flex-direction: column;
  }
  .asm-field-label {
    padding: 5px 10px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }
  .asm-field textarea {
    height: 130px;
    font-size: 12px;
    resize: none;
  }

  .asm-prompt textarea {
    height: 70px;
    color: #d4c4a0;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
  }

  .asm-btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .asm-btn-row button { flex: 1; min-width: 100px; }

  /* ── Log ── */
  .log-wrap {
    border: 1px solid var(--border);
    background: var(--dark);
    overflow: hidden;
  }
  .log-wrap .input-label { display: flex; align-items: center; gap: 8px; }
  .log-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blood); box-shadow: 0 0 6px var(--blood); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .log-scroll {
    max-height: 110px;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .log-entry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    display: flex;
    gap: 10px;
  }
  .log-time { color: #2a1a0a; flex-shrink: 0; }
  .log-info { color: #5a8a5a; }
  .log-ok { color: #00aa44; }
  .log-warn { color: #aa7700; }
  .log-err { color: #cc2200; }
  .log-ai { color: var(--gold); }

  /* ── Output ── */
  .output-wrap {
    border: 1px solid var(--border);
    background: var(--dark);
  }
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    border-bottom: 1px solid var(--border);
  }
  #result {
    min-height: 180px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--green);
    background: #000;
    padding: 12px 14px;
    margin: 0;
    border: none;
    white-space: pre;
    overflow: auto;
    line-height: 1.7;
  }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .copy-all-btn {
    width: 100%;
    padding: 12px;
    background: rgba(139,0,0,0.1);
    border: 1px solid var(--blood);
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 2px;
  }
  .copy-all-btn:hover { background: var(--blood); color: #fff; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <h2>⚜️ SHADOW ENGINE V.24 ⚜️</h2>
    <p>EMPIRE SYSTEM — CODE MANIPULATION CORE</p>
  </div>

  <!-- Input -->
  <div class="input-wrap">
    <div class="input-label">» INPUT — أدخل الكود</div>
    <textarea id="input" placeholder="// أدخل الكود هنا..."></textarea>
  </div>

  <!-- Main buttons -->
  <div class="btn-row">
    <button onclick="togglePanel('p1')">التشفير</button>
    <button onclick="togglePanel('p2')">فك تشفير</button>
    <button onclick="togglePanel('p3')">ترتيب الكود</button>
    <button onclick="togglePanel('p4')">تغيير الوضع</button>
    <button class="btn-assembly" onclick="toggleAssembly()">⚙ تركيب</button>
    <button class="btn-danger" onclick="runPath('generate.js')">توليد</button>
  </div>

  <!-- Sub panels -->
  <div id="p1" class="panel">
    <button onclick="runPath('hex.js')">Hex</button>
    <button onclick="runPath('base64.js')">Base64</button>
  </div>

  <div id="p2" class="panel">
    <button onclick="runPath('decrypt_auto.js')">بدء التفكيك</button>
  </div>

  <div id="p3" class="panel">
    <button onclick="runPath('format_5lines.js')">5 أسطر</button>
    <button onclick="runPath('format_1line.js')">سطر واحد</button>
    <button onclick="runPath('clean_code.js')">حذف تعليقات</button>
  </div>

  <div id="p4" class="panel">
    <button onclick="runPath('mode_compact.js')">مضغوط</button>
    <button onclick="runPath('mode_full.js')">مفصل</button>
  </div>

  <!-- Assembly Panel (تركيب.js) -->
  <div id="assembly-panel">
    <div class="asm-header">
      <span class="asm-title">⚙ وحدة التركيب</span>
      <div class="tabs">
        <button class="tab active" id="tab-ai" onclick="setMode('ai')">AI ذكي</button>
        <button class="tab" id="tab-manual" onclick="setMode('manual')">يدوي</button>
      </div>
    </div>

    <!-- AI prompt -->
    <div id="ai-panel" class="asm-field asm-prompt">
      <div class="asm-field-label">» تعليمات للذكاء الاصطناعي</div>
      <textarea id="aiPrompt" placeholder="مثال: صحح الأخطاء وأضف error handling..."></textarea>
    </div>

    <!-- Manual fields -->
    <div id="manual-panel" class="asm-grid" style="display:none">
      <div class="asm-field">
        <div class="asm-field-label">» التعديل (اسم الدالة ثم الكود)</div>
        <textarea id="editCode" placeholder="اسم_الدالة&#10;// الكود الجديد..."></textarea>
      </div>
      <div class="asm-field" id="add-panel">
        <div class="asm-field-label">» إضافة كود</div>
        <textarea id="addCode" placeholder="// الكود الجديد..."></textarea>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="asm-btn-row">
      <button id="runBtn" class="btn-assembly" onclick="runProcess()">
        <span id="btn-icon">⚜️</span>
        <span id="btn-text">تركيب ومعالجة</span>
      </button>
      <button onclick="clearAll()">مسح الكل</button>
      <button onclick="formatCode()">تنسيق</button>
    </div>

    <!-- Log -->
    <div class="log-wrap">
      <div class="input-label">
        <div class="log-dot"></div>
        سجل العمليات
      </div>
      <div class="log-scroll" id="logArea">
        <div class="log-entry">
          <span class="log-time">00:00:00</span>
          <span class="log-info">وحدة التركيب جاهزة...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Output -->
  <div class="output-wrap">
    <div class="output-header">
      <div class="input-label" style="border:none;padding:0">» OUTPUT — المخرجات</div>
      <span id="lineCount" style="font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace"></span>
    </div>
    <pre id="result">نظام التلاعب جاهز...</pre>
  </div>

  <button class="copy-all-btn" onclick="copyResult()">نسخ المخرجات 📋</button>

</div>

<script src="تركيب.js"></script>
<script>
function togglePanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  const target = document.getElementById(id);
  if (!target.classList.contains('open')) target.classList.add('open');
  else target.classList.remove('open');
}


function toggleAssembly() {
  const panel = document.getElementById('assembly-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    const code = document.getElementById('input').value.trim();
    if (code) {
      const mc = document.getElementById('mainCode');
      if (mc && !mc.value.trim()) {
        mc.value = code;
        shadowLog('تم استيراد الكود من الحقل الرئيسي', 'info');
      }
    }
  }
}


function runPath(path) {
  document.getElementById('result').textContent = `جاري تنفيذ المسار: ${path}...`;
  const script = document.createElement('script');
  script.src = path;
  document.head.appendChild(script);
}


function copyResult() {
  const text = document.getElementById('result').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.currentTarget;
    const orig = btn.textContent;
    btn.textContent = '✓ تم النسخ!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}
</script>

<!-- Hidden mainCode field (used by تركيب.js) -->
<textarea id="mainCode" style="display:none"></textarea>

</body>
</html>
