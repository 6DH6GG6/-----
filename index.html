<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kage No Teio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap');
:root{--gold:#c9a84c;--gold2:#f5e090;--red:#ff0000;--purple:#9b30ff;--purple2:#cc88ff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cinzel',serif;}

/* ══════════════════════
   واجهة 1
══════════════════════ */
#screen1{
  position:fixed;inset:0;z-index:20;
  background:radial-gradient(ellipse 80% 55% at 50% 0%,#1a0a2e 0%,#0d0118 45%,#04000a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1s ease;
}
#screen1.fade-out{opacity:0;pointer-events:none;}
#screen1::before{
  content:'';position:absolute;top:5%;left:50%;transform:translateX(-50%);
  width:clamp(70px,12vw,140px);height:clamp(70px,12vw,140px);border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#fff8e7,#f0d080 40%,#c9a84c 70%,#6b3a00 100%);
  box-shadow:0 0 60px 20px rgba(201,168,76,.3),0 0 110px 40px rgba(201,168,76,.1);
}
.fog{position:absolute;height:100px;left:-10%;width:120%;border-radius:50%;
  background:radial-gradient(ellipse at 50% 80%,rgba(180,160,220,.1),transparent 70%);
  animation:fogA var(--f,18s) linear infinite;pointer-events:none;}
@keyframes fogA{0%,100%{transform:translateX(0);opacity:.6}50%{transform:translateX(4%);opacity:.85}}
.candle-glow{position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,180,60,.5),transparent 70%);
  animation:cF var(--d,2s) ease-in-out infinite alternate;pointer-events:none;}
@keyframes cF{0%{opacity:.5;transform:scale(1)}100%{opacity:.75;transform:scale(1.1)}}
#sakura{position:absolute;inset:0;z-index:2;pointer-events:none;}
#castle1{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:min(900px,100vw);z-index:1;opacity:.65;
  filter:drop-shadow(0 0 20px rgba(201,168,76,.15));}
.gate-ring-wrap{
  position:relative;z-index:5;
  width:clamp(150px,26vw,240px);height:clamp(150px,26vw,240px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .3s;
  margin-bottom:clamp(12px,2.5vw,24px);
}
.gate-ring-wrap:hover{transform:scale(1.07);}
.ring-outer{position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;border-top-color:var(--gold);border-right-color:var(--gold2);
  animation:spin 6s linear infinite;
  box-shadow:0 0 24px rgba(201,168,76,.4),inset 0 0 20px rgba(201,168,76,.07);}
.ring-outer2{position:absolute;inset:10px;border-radius:50%;
  border:1px solid rgba(201,168,76,.3);border-bottom-color:transparent;
  animation:spin 9s linear infinite reverse;}
.ring-pulse{position:absolute;inset:-8px;border-radius:50%;
  border:1.5px solid rgba(201,168,76,.18);animation:rPulse 2.4s ease-in-out infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rPulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.07);opacity:.8}}
.ring-inner{
  position:relative;width:72%;height:72%;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,rgba(60,30,0,.95),rgba(10,0,20,.98));
  border:1.5px solid rgba(201,168,76,.5);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(201,168,76,.18),inset 0 0 28px rgba(0,0,0,.8);
  transition:box-shadow .4s;}
.gate-ring-wrap:hover .ring-inner{box-shadow:0 0 70px rgba(201,168,76,.55),inset 0 0 30px rgba(201,168,76,.1);}
.gate-icon-inner{font-size:clamp(34px,7vw,58px);animation:gPulse 3s ease-in-out infinite;}
@keyframes gPulse{0%,100%{filter:drop-shadow(0 0 6px rgba(201,168,76,.5))}
  50%{filter:drop-shadow(0 0 18px rgba(201,168,76,.95)) drop-shadow(0 0 35px rgba(255,160,0,.4))}}
.rune{position:absolute;font-family:'Cinzel',serif;font-size:clamp(7px,1.3vw,11px);
  color:rgba(201,168,76,.5);letter-spacing:1px;animation:rFlick 4s ease-in-out infinite;}
@keyframes rFlick{0%,100%{opacity:.4}50%{opacity:.85}}
.rune:nth-child(1){top:-20px;left:50%;transform:translateX(-50%)}
.rune:nth-child(2){bottom:-20px;left:50%;transform:translateX(-50%)}
.rune:nth-child(3){right:-26px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl}
.rune:nth-child(4){left:-26px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl}
.gate-label{font-family:'Cinzel Decorative','Cinzel',serif;font-size:clamp(9px,1.8vw,13px);
  color:var(--gold);letter-spacing:4px;text-shadow:0 0 14px rgba(201,168,76,.7);
  text-align:center;animation:lPulse 3s ease-in-out infinite;position:relative;z-index:5;}
.gate-sub{font-size:clamp(7px,1.3vw,9px);color:rgba(201,168,76,.3);letter-spacing:5px;
  margin-top:4px;text-align:center;position:relative;z-index:5;}
@keyframes lPulse{0%,100%{opacity:.7}50%{opacity:1}}

/* ══════════════════════
   واجهة 2
══════════════════════ */
#screen2{position:fixed;inset:0;z-index:10;display:none;}
#screen2.show{display:block;}
#screen2.fade-out{opacity:0;pointer-events:none;transition:opacity 1s;}
#gate-bg{
  position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 45% at 50% 0%,#2a003a 0%,#120020 40%,#000 100%);
  overflow:hidden;}
#castle2-svg{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:min(1100px,100vw);z-index:1;
  filter:drop-shadow(0 0 40px rgba(200,0,0,.5)) drop-shadow(0 0 80px rgba(160,0,0,.3));
  opacity:.85;}
#fog-red{position:absolute;bottom:0;left:0;right:0;height:35%;z-index:2;
  background:linear-gradient(0deg,rgba(60,0,80,.5) 0%,transparent 100%);pointer-events:none;}
#fire-glow{position:absolute;bottom:0;left:0;right:0;height:25%;z-index:2;
  background:radial-gradient(ellipse 80% 100% at 50% 100%,rgba(120,0,200,.35),transparent 70%);
  animation:fireFlicker 1.8s ease-in-out infinite alternate;pointer-events:none;}
@keyframes fireFlicker{0%{opacity:.7}100%{opacity:1}}
#embers-cv{position:absolute;inset:0;z-index:3;pointer-events:none;}

/* ════ تصغير البوابة قليلاً ════ */
#three-canvas{
  position:absolute;inset:0;z-index:4;
  width:78%!important;height:65%!important;
  top:8%!important;
  left:11%!important;
  cursor:pointer;transition:transform .4s ease;}

/* العنوان فوق البوابة */
#gate-title{
  position:absolute;top:clamp(14px,5vh,55px);left:50%;transform:translateX(-50%);
  z-index:8;font-family:'Cinzel Decorative','Cinzel',serif;
  font-size:clamp(11px,2.2vw,18px);font-weight:700;color:#ff6666;letter-spacing:3px;
  text-shadow:0 0 20px rgba(255,0,0,1),0 0 50px rgba(180,0,0,.7);
  white-space:nowrap;
  animation:titlePulse 2.5s ease-in-out infinite;}
@keyframes titlePulse{
  0%,100%{text-shadow:0 0 18px rgba(255,0,0,.8),0 0 40px rgba(180,0,0,.4)}
  50%{text-shadow:0 0 30px rgba(255,0,0,1),0 0 70px rgba(255,0,0,.5)}}

#gate-glow{position:absolute;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(ellipse 40% 50% at 50% 52%,rgba(140,0,255,0),transparent);
  transition:background 1s;}
#gate-glow.lit{background:radial-gradient(ellipse 40% 50% at 50% 52%,rgba(140,0,255,.25) 0%,rgba(80,0,180,.08) 55%,transparent 80%);}
#gate-lightning{position:absolute;inset:0;z-index:6;pointer-events:none;}

/* ══════════════════════════════════════════════════
   زر دائري فخم "تاريخ الدعس" تحت البوابة
══════════════════════════════════════════════════ */
#btn-enter{
  position:absolute;
  bottom:clamp(22px,4vh,44px);
  left:50%;transform:translateX(-50%);
  z-index:9;
  opacity:0;pointer-events:none;
  transition:opacity 1s ease 0.5s;
}
#btn-enter.show{opacity:1;pointer-events:auto;}

/* حاوية الزر الدائري */
.circle-btn-wrap{
  position:relative;
  width:clamp(110px,16vw,150px);
  height:clamp(110px,16vw,150px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

/* حلقات تدور حول الزر */
.cb-ring1{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--purple);border-right-color:var(--purple2);
  animation:spin 4s linear infinite;
  box-shadow:0 0 18px rgba(155,48,255,.5);
}
.cb-ring2{
  position:absolute;inset:-20px;border-radius:50%;
  border:1.5px solid rgba(155,48,255,.3);
  border-bottom-color:rgba(204,136,255,.6);border-left-color:transparent;
  animation:spin 7s linear infinite reverse;
}
.cb-ring3{
  position:absolute;inset:-30px;border-radius:50%;
  border:1px solid rgba(155,48,255,.15);
  border-top-color:rgba(204,136,255,.35);border-right-color:transparent;
  animation:spin 11s linear infinite;
}

/* لماعات تدور حول الزر */
.cb-spark{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:radial-gradient(circle,#fff,var(--purple));
  box-shadow:0 0 8px 3px rgba(155,48,255,.9);
  animation:sparkOrbit var(--so,5s) linear infinite;
  transform-origin:calc(clamp(55px,8vw,75px) + 34px) 0;
  top:50%;left:50%;margin:-3px;
}
@keyframes sparkOrbit{
  0%{transform:rotate(0deg) translateX(calc(clamp(55px,8vw,75px) + 34px));}
  100%{transform:rotate(360deg) translateX(calc(clamp(55px,8vw,75px) + 34px));}
}
.cb-spark:nth-child(5){--so:3.5s;animation-delay:0s;}
.cb-spark:nth-child(6){--so:3.5s;animation-delay:-1.17s;}
.cb-spark:nth-child(7){--so:3.5s;animation-delay:-2.33s;}
.cb-spark:nth-child(8){--so:5s;animation-delay:-1.25s;}
.cb-spark:nth-child(9){--so:5s;animation-delay:-3.75s;}

/* نبض توهج خلف الزر */
.cb-pulse{
  position:absolute;inset:-5px;border-radius:50%;
  background:radial-gradient(circle,rgba(155,48,255,.22),transparent 70%);
  animation:cbPulse 2s ease-in-out infinite;
}
@keyframes cbPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.18);opacity:1}}

/* الزر الدائري نفسه */
.circle-btn{
  position:relative;
  width:clamp(110px,16vw,150px);
  height:clamp(110px,16vw,150px);
  border-radius:50%;
  background:radial-gradient(circle at 38% 35%,
    rgba(30,0,50,.97),
    rgba(5,0,15,.99));
  border:2px solid rgba(155,48,255,.55);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
  box-shadow:
    0 0 30px rgba(155,48,255,.5),
    0 0 65px rgba(100,0,200,.2),
    inset 0 0 30px rgba(0,0,0,.8),
    inset 0 0 10px rgba(155,48,255,.08);
  transition:box-shadow .3s,transform .2s;
  font-family:'Cinzel Decorative','Cinzel',serif;
  font-size:clamp(10px,1.5vw,13px);
  font-weight:700;color:#d4aaff;
  letter-spacing:2px;text-align:center;line-height:1.35;
  text-shadow:0 0 12px rgba(155,48,255,.9);
}
.circle-btn::before{
  content:'';position:absolute;top:-130%;left:0;
  width:100%;height:50%;
  background:linear-gradient(180deg,transparent,rgba(180,100,255,.12),transparent);
  border-radius:50%;
  animation:cbSw 3.8s ease-in-out infinite;
}
@keyframes cbSw{0%{top:-130%}60%{top:130%}100%{top:130%}}
.circle-btn:hover{
  box-shadow:
    0 0 50px rgba(155,48,255,.75),
    0 0 100px rgba(120,0,255,.35),
    inset 0 0 30px rgba(0,0,0,.7),
    inset 0 0 18px rgba(155,48,255,.12);
  transform:scale(1.08);
}
.circle-btn:active{transform:scale(.93);}
.circle-btn-text{position:relative;z-index:2;padding:0 8px;}

/* ══════════════════════
   كلمة السر
══════════════════════ */
#pw-panel{position:fixed;inset:0;z-index:50;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);backdrop-filter:blur(12px);}
#pw-panel.show{display:flex;}
.pw-card{
  position:relative;
  background:linear-gradient(160deg,rgba(6,2,14,.97),rgba(12,2,22,.98));
  border:1px solid rgba(201,168,76,.38);border-radius:4px;
  padding:34px 28px 26px;width:min(350px,92vw);
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;animation:cardIn .38s cubic-bezier(.34,1.56,.64,1);}
@keyframes cardIn{from{transform:scale(.84) translateY(18px);opacity:0}to{transform:none;opacity:1}}
.pw-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);}
.pw-c{position:absolute;width:14px;height:14px;border-color:var(--gold);border-style:solid;}
.pw-c.tl{top:0;right:0;border-width:1.5px 1.5px 0 0}
.pw-c.tr{top:0;left:0;border-width:1.5px 0 0 1.5px}
.pw-c.bl{bottom:0;right:0;border-width:0 1.5px 1.5px 0}
.pw-c.br{bottom:0;left:0;border-width:0 0 1.5px 1.5px}
.pw-icon{font-size:34px;margin-bottom:8px;
  filter:drop-shadow(0 0 12px rgba(201,168,76,.8));animation:ePulse 3s ease-in-out infinite;}
@keyframes ePulse{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.6))}
  50%{filter:drop-shadow(0 0 22px rgba(240,208,128,1))}}
.pw-title{font-family:'Cinzel Decorative','Cinzel',serif;font-size:clamp(12px,2.4vw,15px);
  color:var(--gold2);text-shadow:0 0 12px rgba(201,168,76,.7);letter-spacing:2px;margin-bottom:3px;text-align:center;}
.pw-sub{font-size:10px;color:rgba(201,168,76,.35);letter-spacing:2px;margin-bottom:16px;text-align:center;}
.pw-rule{width:100%;display:flex;align-items:center;gap:6px;margin-bottom:16px;}
.pw-rl{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.pw-rd{width:5px;height:5px;background:var(--gold2);transform:rotate(45deg);box-shadow:0 0 7px var(--gold);flex-shrink:0;}
.pw-input{
  width:100%;background:rgba(201,168,76,.04);
  border:1.5px solid rgba(201,168,76,.25);border-radius:3px;
  color:var(--gold2);font-family:'Cinzel',serif;font-size:14px;
  padding:12px 14px;outline:none;text-align:center;
  letter-spacing:3px;direction:rtl;
  transition:border-color .2s,box-shadow .2s;margin-bottom:14px;}
.pw-input:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.18);}
.pw-input::placeholder{color:rgba(201,168,76,.2);font-size:11px;}
.pw-btns{display:flex;gap:9px;width:100%;}
.pw-ok{flex:1;
  background:linear-gradient(135deg,#3d2200,#c9a84c 40%,#f5e090 60%,#c9a84c 80%,#3d2200);
  border:none;border-radius:3px;color:#1a0900;
  font-family:'Cinzel Decorative','Cinzel',serif;font-size:13px;font-weight:700;
  padding:11px 0;cursor:pointer;letter-spacing:2px;box-shadow:0 0 16px rgba(201,168,76,.32);}
.pw-ok:active{transform:scale(.96);}
.pw-back{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.25);border-radius:3px;
  color:rgba(201,168,76,.5);font-family:'Cinzel',serif;font-size:11px;
  padding:11px 15px;cursor:pointer;transition:all .2s;}
.pw-back:hover{background:rgba(201,168,76,.1);color:var(--gold);}
.pw-err{font-size:11px;color:#ff5544;margin-top:10px;display:none;text-align:center;}
.pw-err.show{display:block;animation:eShake .35s ease;}
@keyframes eShake{0%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}
  60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}

/* ══════════════════════
   انتقال
══════════════════════ */
#black-cover{position:fixed;inset:0;z-index:80;background:#000;
  opacity:0;pointer-events:none;transition:opacity 1s;}
#black-cover.show{opacity:1;pointer-events:auto;}
.wave-ring{position:fixed;pointer-events:none;border-radius:50%;
  border:2px solid rgba(201,168,76,.55);
  transform:translate(-50%,-50%) scale(0);
  animation:wRing .9s ease-out forwards;z-index:200;}
@keyframes wRing{to{transform:translate(-50%,-50%) scale(4.5);opacity:0}}

/* ══════════════════════
   واجهة 3 — الرئيسية
══════════════════════ */
#screen3{
  position:fixed;inset:0;z-index:5;
  opacity:0;pointer-events:none;transition:opacity 1.4s ease;
  display:flex;flex-direction:column;
  overflow:hidden;}
#screen3.visible{opacity:1;pointer-events:auto;}

#main-bg{
  position:absolute;inset:0;z-index:0;
  background:url('background.jpg') center/cover no-repeat #02000a;}
#main-bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55);}

#hexagram{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:clamp(260px,46vmin,500px);height:clamp(260px,46vmin,500px);
  opacity:.22;filter:drop-shadow(0 0 18px #ff0000) drop-shadow(0 0 50px #8b0000);
  animation:hexPulse 4s ease-in-out infinite;pointer-events:none;z-index:1;}
@keyframes hexPulse{0%,100%{opacity:.16}50%{opacity:.3}}

#lightning-canvas{position:absolute;inset:0;z-index:2;pointer-events:none;}
.royal-halo{position:absolute;inset:0;z-index:3;pointer-events:none;
  animation:haloB 2.4s ease-in-out infinite;}
@keyframes haloB{0%,100%{box-shadow:inset 0 0 100px rgba(160,0,0,.14)}
  50%{box-shadow:inset 0 0 170px rgba(220,0,0,.26)}}

/* شريط النص */
#scroll-frame{
  position:absolute;
  top:0;left:0;right:0;
  height:clamp(44px,8vh,70px);
  z-index:10;overflow:hidden;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  border-bottom:1.5px solid rgba(201,168,76,.35);
  box-shadow:0 0 22px rgba(201,168,76,.1),0 2px 30px rgba(0,0,0,.5);
  display:flex;align-items:center;
}
#scroll-frame::before{content:'';position:absolute;top:0;right:0;
  width:14px;height:14px;border-top:2px solid var(--gold);border-right:2px solid var(--gold);}
#scroll-frame::after{content:'';position:absolute;top:0;left:0;
  width:14px;height:14px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
#scroll-text{
  font-family:'Cinzel Decorative','Cinzel',serif;
  font-size:clamp(12px,2.2vw,20px);font-weight:700;
  color:#fff;text-shadow:0 0 20px rgba(255,0,0,.9),0 0 50px rgba(255,0,0,.5);
  white-space:nowrap;letter-spacing:4px;
  opacity:0;position:absolute;
}
@keyframes scrollLTR{
  0%{transform:translateX(-60vw);opacity:0;}
  8%{opacity:1;}85%{opacity:1;}
  100%{transform:translateX(100vw);opacity:0;}
}

/* شريط الأقسام */
#nav-bar{
  position:absolute;top:clamp(44px,8vh,70px);left:0;right:0;
  height:clamp(38px,6vh,52px);z-index:9;
  display:none;align-items:center;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;background:rgba(0,0,0,.45);
  border-bottom:1px solid rgba(201,168,76,.2);gap:0;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
#nav-bar::-webkit-scrollbar{display:none;}
#nav-bar.show{display:flex;}
.nav-btn{
  flex-shrink:0;scroll-snap-align:start;
  font-family:'Cinzel',serif;font-size:clamp(9px,1.4vw,12px);
  color:rgba(201,168,76,.75);letter-spacing:2px;
  background:transparent;border:none;
  padding:0 clamp(12px,2vw,22px);height:100%;
  cursor:pointer;white-space:nowrap;
  border-left:1px solid rgba(201,168,76,.12);
  transition:color .2s,background .2s;}
.nav-btn:last-child{border-right:1px solid rgba(201,168,76,.12);}
.nav-btn:hover{color:var(--gold2);background:rgba(201,168,76,.07);}
.nav-btn.active{color:var(--gold2);background:rgba(201,168,76,.12);
  box-shadow:inset 0 -2px 0 var(--gold);}

/* منطقة المحتوى */
#main-content{
  position:absolute;top:clamp(44px,8vh,70px);left:0;right:0;bottom:0;
  z-index:8;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.3) transparent;
  display:flex;flex-direction:column;align-items:center;

(function(){
  const cv=document.getElementById('sakura'),ctx=cv.getContext('2d');
  let W,H,petals=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const C=['rgba(255,183,197,','rgba(255,214,224,','rgba(255,160,180,','rgba(255,235,240,'];
  function mk(){return{x:Math.random()*W,y:-20-Math.random()*60,
    s:4+Math.random()*9,r:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.05,
    vx:(Math.random()-.5)*1.3,vy:.6+Math.random()*1.3,
    sw:Math.random()*Math.PI*2,ss:.02+Math.random()*.03,
    a:.5+Math.random()*.4,col:C[Math.floor(Math.random()*C.length)],wb:Math.random()*Math.PI*2};}
  for(let i=0;i<50;i++){const p=mk();p.y=Math.random()*H;petals.push(p);}
  function dp(p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.globalAlpha=p.a;
    ctx.fillStyle=p.col+'1)';ctx.beginPath();ctx.ellipse(0,0,p.s*.5,p.s,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  function loop(){ctx.clearRect(0,0,W,H);
    if(petals.length<65&&Math.random()<.3)petals.push(mk());
    for(let i=petals.length-1;i>=0;i--){const p=petals[i];
      p.sw+=p.ss;p.wb+=.014;p.x+=p.vx+Math.sin(p.sw)*.8;p.y+=p.vy+Math.sin(p.wb)*.25;p.r+=p.rs;
      dp(p);if(p.y>H+25||p.x<-25||p.x>W+25)petals.splice(i,1);}
    requestAnimationFrame(loop);}
  loop();
})();

/* ══ جمر متطاير (واجهة 2) ══ */
(function(){
  const cv=document.getElementById('embers-cv'),ctx=cv.getContext('2d');
  let W,H,sparks=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  function mk(){return{x:Math.random()*W,y:H+10,
    vx:(Math.random()-.5)*1.2,vy:-(1+Math.random()*2.5),life:1,s:1.5+Math.random()*2.5};}
  for(let i=0;i<30;i++){const s=mk();s.y=Math.random()*H;sparks.push(s);}
  function loop(){ctx.clearRect(0,0,W,H);
    if(sparks.length<60&&Math.random()<.4)sparks.push(mk());
    for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];
      s.x+=s.vx;s.y+=s.vy;s.life-=.007;s.vx+=(Math.random()-.5)*.08;
      ctx.beginPath();ctx.arc(s.x,s.y,s.s*s.life,0,Math.PI*2);
      ctx.fillStyle=`rgba(${180+s.life*40|0},0,255,${s.life*.8})`;ctx.fill();
      if(s.life<=0||s.y<-10)sparks.splice(i,1);}
    requestAnimationFrame(loop);}
  loop();
})();

/* ══ واجهة 1 → واجهة 2 ══ */
function goToScreen2(){
  document.getElementById('screen1').classList.add('fade-out');
  setTimeout(()=>{
    document.getElementById('screen1').style.display='none';
    document.getElementById('screen2').classList.add('show');

  },1000);
}

/* ══ برق البوابة (واجهة 2) ══ */
const glcv=document.getElementById('gate-lightning'),glctx=glcv.getContext('2d');
let glW,glH,glBolts=[],glOn=false;
function resizeGL(){glW=glcv.width=innerWidth;glH=glcv.height=innerHeight;}
resizeGL();window.addEventListener('resize',resizeGL);
function glSpawn(){
  const cx=glW/2,cy=glH*.48,a=-Math.PI/2+(Math.random()-.5)*Math.PI*1.6;
  const pts=[{x:cx,y:cy}];let x=cx,y=cy;
  for(let i=0;i<(7+Math.random()*9|0);i++){
    x+=Math.cos(a)*(18+Math.random()*35)+(Math.random()-.5)*65;
    y+=Math.sin(a)*(18+Math.random()*35)+(Math.random()-.5)*32;
    pts.push({x,y});if(y<-30||y>glH+30)break;}
  return{pts,life:1,decay:.09+Math.random()*.11,
    color:Math.random()>.3?'255,0,0':`${210+Math.random()*45|0},${Math.random()*14|0},0`};}
function glLoop(){
  if(!glOn){glctx.clearRect(0,0,glW,glH);return;}
  glctx.clearRect(0,0,glW,glH);
  if(Math.random()<.13)glBolts.push(glSpawn());
  for(let i=glBolts.length-1;i>=0;i--){const b=glBolts[i];
    glctx.beginPath();glctx.moveTo(b.pts[0].x,b.pts[0].y);
    for(let j=1;j<b.pts.length;j++)glctx.lineTo(b.pts[j].x,b.pts[j].y);
    glctx.strokeStyle=`rgba(${b.color},${b.life*.9})`;glctx.lineWidth=2.5+b.life*2;
    glctx.shadowColor=`rgba(${b.color},1)`;glctx.shadowBlur=28*b.life;
    glctx.stroke();glctx.shadowBlur=0;b.life-=b.decay;if(b.life<=0)glBolts.splice(i,1);}
  requestAnimationFrame(glLoop);}
function startGL(){if(glOn)return;glOn=true;glBolts=[];requestAnimationFrame(glLoop);}
function stopGL(){glOn=false;glBolts=[];glctx.clearRect(0,0,glW,glH);}

/* ══ Three.js ══ */
let scene,camera,renderer,doorL,doorR;
let doorsOpening=false,doorAngle=0;

const OPEN_ANGLE = Math.PI;
const DOOR_SPEED = OPEN_ANGLE / (5 * 60);

let redLights=[],backGlow;
let threeInited=false;

function initThree(){
  if(threeInited||!window.THREE)return;threeInited=true;
  const canvas=document.getElementById('three-canvas');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.outputEncoding=THREE.sRGBEncoding;
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.01,200);
  camera.position.set(0,0,8);camera.lookAt(0,0,0);
  scene.add(new THREE.AmbientLight(0x110022,2.2));
  const dL=new THREE.DirectionalLight(0x6600aa,2.5);dL.position.set(0,2,5);scene.add(dL);
  const dL2=new THREE.DirectionalLight(0x440088,1.8);dL2.position.set(0,-1,-3);scene.add(dL2);
  const rL1=new THREE.PointLight(0x9900ff,0,18);rL1.position.set(-4,1,3);scene.add(rL1);
  const rL2=new THREE.PointLight(0x9900ff,0,18);rL2.position.set(4,1,3);scene.add(rL2);
  redLights=[rL1,rL2];
  backGlow=new THREE.PointLight(0xaa44ff,0,18);backGlow.position.set(0,0,-2);scene.add(backGlow);
  function resizeR(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
  resizeR();window.addEventListener('resize',resizeR);
  const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
  canvas.addEventListener('click',e=>{
    if(doorsOpening)return;
    const rc=canvas.getBoundingClientRect();
    mouse.x=((e.clientX-rc.left)/rc.width)*2-1;
    mouse.y=-((e.clientY-rc.top)/rc.height)*2+1;
    ray.setFromCamera(mouse,camera);
    if(ray.intersectObjects(scene.children,true).length>0)onGateClick();
  });
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onload=loadGLB;s.onerror=buildFallback;
  document.head.appendChild(s);
  (function animate(){
    requestAnimationFrame(animate);
    if(doorsOpening){
      doorAngle=Math.min(doorAngle+DOOR_SPEED,OPEN_ANGLE);
      if(doorL) doorL.rotation.y = -doorAngle;
      if(doorR) doorR.rotation.y =  doorAngle;
      if(backGlow) backGlow.intensity=(doorAngle/OPEN_ANGLE)*4;
    }
    renderer.render(scene,camera);
  })();
}

function loadGLB(){
  if(!window.THREE.GLTFLoader){buildFallback();return;}
  new THREE.GLTFLoader().load('GggG.glb',gltf=>{
    const model=gltf.scene;
    model.traverse(c=>{
      if(c.name==='Door_L')doorL=c;
      if(c.name==='Door_R')doorR=c;
      if(c.isMesh&&c.material){
        /* لون أسود مع إطار بنفسجي */
        c.material.color.set(0x000000);
        c.material.emissive.set(0x1a0033);
        c.material.needsUpdate=true;}
    });
    const box=new THREE.Box3().setFromObject(model);
    const sz=box.getSize(new THREE.Vector3());
    const cn=box.getCenter(new THREE.Vector3());
    const sc=4.5/Math.max(sz.x,sz.y,sz.z);
    model.scale.setScalar(sc);
    model.position.set(-cn.x*sc,-cn.y*sc,-cn.z*sc);
    scene.add(model);
    document.getElementById('btn-enter').classList.add('show');
  },null,buildFallback);
}

function buildFallback(){
  /* مادة سوداء مع حواف بنفسجية */
  const mat=new THREE.MeshStandardMaterial({
    color:0x000000,
    emissive:0x220044,
    roughness:.15,metalness:.95,side:THREE.DoubleSide});

  /* إطار البوابة — بنفسجي */
  const frameMat=new THREE.MeshStandardMaterial({
    color:0x1a0033,
    emissive:0x660099,
    roughness:.1,metalness:1,side:THREE.DoubleSide});

  /* الإطار العلوي */
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(3.1,.18,.14),frameMat),
    {position:new THREE.Vector3(0,1.82,.01)}));
  /* الإطار السفلي */
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(3.1,.18,.14),frameMat),
    {position:new THREE.Vector3(0,-1.82,.01)}));
  /* الإطار الأيسر */
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.18,3.64,.14),frameMat),
    {position:new THREE.Vector3(-1.46,0,.01)}));
  /* الإطار الأيمن */
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.18,3.64,.14),frameMat),
    {position:new THREE.Vector3(1.46,0,.01)}));

  /* الباب الأيسر */
  const geoL=new THREE.BoxGeometry(1.3,3.6,.09);
  geoL.translate(.65,0,0);
  doorL=new THREE.Mesh(geoL,mat.clone());
  doorL.position.set(-1.3,0,.07);
  scene.add(doorL);

  /* الباب الأيمن */
  const geoR=new THREE.BoxGeometry(1.3,3.6,.09);
  geoR.translate(-.65,0,0);
  doorR=new THREE.Mesh(geoR,mat.clone());
  doorR.position.set(1.3,0,.07);
  scene.add(doorR);

  /* خطوط بنفسجية على الأبواب */
  const edgeMat=new THREE.MeshStandardMaterial({color:0x000000,emissive:0x8800cc,roughness:.05,metalness:1});
  [-1.3,1.3].forEach(x=>{
    const eg=new THREE.BoxGeometry(.04,3.4,.12);
    scene.add(Object.assign(new THREE.Mesh(eg,edgeMat),{position:new THREE.Vector3(x+(x<0?.02:-.02),0,.08)}));
  });

  document.getElementById('btn-enter').classList.add('show');
}

/* ══ النقر على البوابة → كلمة السر ══ */
function onGateClick(){
  const cv=document.getElementById('three-canvas');
  cv.style.transform='scale(1.04)';
  document.getElementById('gate-glow').classList.add('lit');
  if(typeof YYY!=='undefined') YYY.startPurple();
  startGL();
  let lt=0;
  const lInt=setInterval(()=>{
    lt+=.1;const v=.5+Math.sin(lt*8)*.5;
    redLights.forEach(l=>l.intensity=v*4);},16);
  setTimeout(()=>{
    clearInterval(lInt);
    redLights.forEach(l=>l.intensity=0);
    stopGL();
    if(typeof YYY!=='undefined') YYY.stop();
    cv.style.transform='scale(1)';
    showPW();
  },1600);
}

const CORRECT_PW='الظلام المتجمد';

function showPW(){
  document.getElementById('pw-panel').classList.add('show');
  setTimeout(()=>document.getElementById('pwInput').focus(),300);
}
function closePW(){
  document.getElementById('pw-panel').classList.remove('show');
  document.getElementById('pwInput').value='';
  document.getElementById('pwErr').classList.remove('show');
  document.getElementById('gate-glow').classList.remove('lit');
}
function checkPW(){
  const val=document.getElementById('pwInput').value.trim();
  if(val===CORRECT_PW){
    document.getElementById('pwErr').classList.remove('show');
    enterMain();
  }else{
    const e=document.getElementById('pwErr');
    e.classList.remove('show');void e.offsetWidth;e.classList.add('show');
    startGL();setTimeout(stopGL,900);
    setTimeout(()=>e.classList.remove('show'),3200);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePW();});

function enterMain(){
  document.getElementById('pw-panel').classList.remove('show');
  doorsOpening=true;doorAngle=0;
  document.getElementById('gate-glow').classList.add('lit');
  startGL();
  const sfx=document.getElementById('open-sfx');
  sfx.currentTime=0;sfx.play().catch(()=>{});
  let lt=0;
  const lInt=setInterval(()=>{
    lt+=.1;const v=.5+Math.sin(lt*8)*.5;
    redLights.forEach(l=>l.intensity=v*4);},16);
  setTimeout(()=>{
    clearInterval(lInt);
    redLights.forEach(l=>l.intensity=0);
    stopGL();
    const cover=document.getElementById('black-cover');
    cover.classList.add('show');
    setTimeout(()=>{
      document.getElementById('screen2').classList.add('fade-out');
      document.getElementById('screen3').classList.add('visible');
      const bg=document.getElementById('bg-music');
      bg.volume=.55;bg.play().catch(()=>{});
      if(typeof YYY!=='undefined') YYY.start();
      startScrollText();
      const nb=document.getElementById('nav-bar');
      if(nb.classList.contains('show')){
        const sh=nb.offsetHeight;
        const sf=document.getElementById('scroll-frame').offsetHeight;
        document.getElementById('main-content').style.top=(sf+sh)+'px';
      }
      setTimeout(()=>cover.classList.remove('show'),700);
    },500);
  },5000);
}

/* ══ رعد واجهة 3 ══ */
if(typeof YYY==='undefined'){
  window.YYY=(function(){
    const cv=document.getElementById('lightning-canvas'),ctx=cv.getContext('2d');
    let W,H,bolts=[],active=false,last=0;
    function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
    resize();window.addEventListener('resize',resize);
    function spawn(){
      const pts=[],sx=Math.random()*W,sy=Math.random()*H*.3,
            ex=Math.random()*W,ey=H*.5+Math.random()*H*.5;
      pts.push({x:sx,y:sy});let cx=sx,cy=sy;
      for(let i=1;i<10;i++){const p=i/10;
        cx=(sx+(ex-sx)*p)+(Math.random()-.5)*60;
        cy=(sy+(ey-sy)*p)+(Math.random()-.5)*60;
        pts.push({x:cx,y:cy});}
      pts.push({x:ex,y:ey});return{points:pts,life:1};}
    function loop(now){
      if(!active)return;ctx.clearRect(0,0,W,H);
      if(now-last>=1000){bolts.push(spawn());last=now;}
      for(let i=bolts.length-1;i>=0;i--){const b=bolts[i];
        ctx.beginPath();ctx.moveTo(b.points[0].x,b.points[0].y);
        for(let j=1;j<b.points.length;j++)ctx.lineTo(b.points[j].x,b.points[j].y);
        ctx.strokeStyle=`rgba(255,0,0,${b.life})`;ctx.lineWidth=3;
        ctx.shadowColor='red';ctx.shadowBlur=25;ctx.stroke();ctx.shadowBlur=0;
        b.life-=.05;if(b.life<=0)bolts.splice(i,1);}
      requestAnimationFrame(loop);}
    return{
      start(){if(active)return;active=true;last=0;requestAnimationFrame(loop);},
      startPurple(){if(active)return;active=true;last=0;requestAnimationFrame(loop);},
      stop(){active=false;ctx.clearRect(0,0,W,H);bolts.length=0;}
    };
  })();
}

/* ══ النص المتحرك ══ */
const TEXTS=[
  'طائفة الظلام',
  'يبدو أن ظلاماً بدأ يسيطر',
  'الأرض التي اعتادت السلام صدى نصلها'
];
let txtIdx=0;
function startScrollText(){showNextText();}
function showNextText(){
  const el=document.getElementById('scroll-text');
  el.style.animation='none';
  el.style.opacity='0';
  el.textContent=TEXTS[txtIdx];
  void el.offsetWidth;
  el.style.animation='scrollLTR 14s linear forwards';
  txtIdx=(txtIdx+1)%TEXTS.length;
  setTimeout(showNextText,14600);
}
