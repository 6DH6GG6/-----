<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Kage No Teio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght=700;900&family=Cinzel:wght=400;600&family=Cairo:wght=400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════ */
:root{
  --gold:#c9a84c; --gold2:#f5e090;
  --red:#ff0000;  --red2:#8b0000;
  --purple:#9b30ff; --purple2:#cc88ff;
  --s1-bg:radial-gradient(ellipse 80% 55% at 50% 0%,#1a0a2e 0%,#0d0118 45%,#04000a 100%);
  --s2-bg:radial-gradient(ellipse 60% 45% at 50% 0%,#2a003a 0%,#120020 40%,#000 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cinzel',serif}

/* ══════════════════════════════════════
   SCREEN 1 — البوابة الأولى
══════════════════════════════════════ */
#screen1{
  position:fixed;inset:0;z-index:20;
  background:var(--s1-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .9s ease;
}
#screen1.fade-out{opacity:0;pointer-events:none}
#screen1::before{
  content:'';position:absolute;
  top:5%;left:50%;transform:translateX(-50%);
  width:clamp(60px,11vw,130px);height:clamp(60px,11vw,130px);border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#fff8e7,#f0d080 40%,#c9a84c 70%,#6b3a00 100%);
  box-shadow:0 0 60px 20px rgba(201,168,76,.3),0 0 110px 40px rgba(201,168,76,.1);
}
.s1-fog{
  position:absolute;height:90px;left:-10%;width:120%;border-radius:50%;
  background:radial-gradient(ellipse at 50% 80%,rgba(180,160,220,.1),transparent 70%);
  animation:fogDrift var(--fd,18s) linear infinite;pointer-events:none;
}
@keyframes fogDrift{0%,100%{transform:translateX(0);opacity:.6}50%{transform:translateX(4%);opacity:.85}}
.s1-candle{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,180,60,.5),transparent 70%);
  animation:candleFlicker var(--cf,2s) ease-in-out infinite alternate;pointer-events:none;
}
@keyframes candleFlicker{0%{opacity:.5;transform:scale(1)}100%{opacity:.75;transform:scale(1.1)}}
#s1-sakura{position:absolute;inset:0;z-index:2;pointer-events:none}
#s1-castle{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:min(900px,100vw);z-index:1;opacity:.65;
  filter:drop-shadow(0 0 20px rgba(201,168,76,.15));
}
.gate-ring-wrap{
  position:relative;z-index:5;
  width:clamp(140px,24vw,230px);height:clamp(140px,24vw,230px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .3s;
  margin-bottom:clamp(10px,2vw,22px);
}
.gate-ring-wrap:hover{transform:scale(1.07)}
.ring-outer{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;border-top-color:var(--gold);border-right-color:var(--gold2);
  animation:spinCW 6s linear infinite;
  box-shadow:0 0 24px rgba(201,168,76,.4),inset 0 0 20px rgba(201,168,76,.07);
}
.ring-outer2{
  position:absolute;inset:10px;border-radius:50%;
  border:1px solid rgba(201,168,76,.3);border-bottom-color:transparent;
  animation:spinCCW 9s linear infinite;
}
.ring-pulse{
  position:absolute;inset:-8px;border-radius:50%;
  border:1.5px solid rgba(201,168,76,.18);
  animation:ringPulse 2.4s ease-in-out infinite;
}
@keyframes spinCW{to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.07);opacity:.8}}
.ring-inner{
  position:relative;width:72%;height:72%;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,rgba(60,30,0,.95),rgba(10,0,20,.98));
  border:1.5px solid rgba(201,168,76,.5);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(201,168,76,.18),inset 0 0 28px rgba(0,0,0,.8);
  transition:box-shadow .4s;
}
.gate-ring-wrap:hover .ring-inner{box-shadow:0 0 70px rgba(201,168,76,.55),inset 0 0 30px rgba(201,168,76,.1)}
.gate-icon{font-size:clamp(32px,6.5vw,56px);animation:iconPulse 3s ease-in-out infinite}
@keyframes iconPulse{
  0%,100%{filter:drop-shadow(0 0 6px rgba(201,168,76,.5))}
  50%{filter:drop-shadow(0 0 18px rgba(201,168,76,.95)) drop-shadow(0 0 35px rgba(255,160,0,.4))}}

/* ══════════════════════════════════════
   LOADER
══════════════════════════════════════ */
#loader-overlay{
  position:fixed;inset:0;z-index:30;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:var(--s1-bg);
}
#loader-overlay.show{display:flex}
#loader-title{
  font-family:'Cairo', sans-serif;font-weight:700;
  font-size:clamp(16px,2.5vw,24px);
  color:var(--gold2);letter-spacing:1px;
  margin-bottom:clamp(24px,4vh,44px);
  text-shadow:0 0 20px rgba(245,224,144,.6);
  animation:labelPulse 1.5s ease-in-out infinite;
}
#loader-wrap{
  position:relative;width:clamp(220px,52vw,460px);height:clamp(16px,2.2vh,24px);
}
#loader-wrap::before{
  content:'';position:absolute;inset:0;
  border:1.5px solid rgba(201,168,76,.45);border-radius:2px;
  box-shadow:0 0 18px rgba(201,168,76,.2),inset 0 0 14px rgba(0,0,0,.7);
}
#loader-wrap::after{
  content:'';position:absolute;inset:-4px;border-radius:3px;
  box-shadow:-4px -4px 0 0 rgba(201,168,76,.55),4px -4px 0 0 rgba(201,168,76,.55),
             -4px 4px 0 0 rgba(201,168,76,.55),4px 4px 0 0 rgba(201,168,76,.55);
}
#loader-bar{
  position:absolute;top:3px;left:3px;bottom:3px;width:0%;border-radius:1px;
  background:linear-gradient(90deg,rgba(201,168,76,.4),rgba(245,224,144,.9) 50%,rgba(201,168,76,.4));
  box-shadow:0 0 18px rgba(201,168,76,.8),0 0 40px rgba(201,168,76,.4);
  transition:width .05s linear;
}
#loader-bar::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:24px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7));
  animation:barShine .6s ease-in-out infinite alternate;
}
@keyframes barShine{0%{opacity:.4}100%{opacity:1}}
#loader-pct{
  font-family:'Cinzel',serif;font-size:clamp(12px,1.6vw,16px);font-weight:600;
  color:var(--gold2);letter-spacing:2px;
  margin-top:clamp(12px,2vh,20px);text-shadow:0 0 12px rgba(201,168,76,.6);
}

/* ══════════════════════════════════════
   SCREEN 2 — بوابة البوابة 3D
══════════════════════════════════════ */
#screen2{position:fixed;inset:0;z-index:10;display:none;opacity:0}
#screen2.show{display:block}
#screen2.fade-out{opacity:0;pointer-events:none;transition:opacity 1s}
#s2-bg{position:absolute;inset:0;z-index:0;overflow:hidden;background:var(--s2-bg);}
#s2-castle{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:min(1100px,100vw);z-index:1;
  filter:drop-shadow(0 0 40px rgba(200,0,0,.5)) drop-shadow(0 0 80px rgba(160,0,0,.3));opacity:.85;
}
#s2-fog{position:absolute;bottom:0;left:0;right:0;height:35%;z-index:2;background:linear-gradient(0deg,rgba(60,0,80,.5),transparent);pointer-events:none;}
#s2-fire{
  position:absolute;bottom:0;left:0;right:0;height:25%;z-index:2;
  background:radial-gradient(ellipse 80% 100% at 50% 100%,rgba(120,0,200,.35),transparent 70%);
  animation:fireFlicker 1.8s ease-in-out infinite alternate;pointer-events:none;
}
@keyframes fireFlicker{0%{opacity:.7}100%{opacity:1}}
#s2-embers{position:absolute;inset:0;z-index:3;pointer-events:none}
#three-canvas{
  position:absolute;z-index:4;
  width:100%!important;height:100%!important;
  top:0!important;left:0!important;
  cursor:pointer;
}
#s2-title{
  position:absolute;top:clamp(12px,4vh,50px);left:50%;transform:translateX(-50%);
  z-index:8;font-family:'Cinzel Decorative','Cinzel',serif;
  font-size:clamp(10px,2vw,16px);font-weight:700;
  color:#ff6666;letter-spacing:3px;
  text-shadow:0 0 20px rgba(255,0,0,1),0 0 50px rgba(180,0,0,.7);
  white-space:nowrap;animation:titlePulse 2.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes titlePulse{
  0%,100%{text-shadow:0 0 18px rgba(255,0,0,.8),0 0 40px rgba(180,0,0,.4)}
  50%{text-shadow:0 0 30px rgba(255,0,0,1),0 0 70px rgba(255,0,0,.5)}}
#s2-glow{
  position:absolute;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(ellipse 40% 50% at 50% 52%,rgba(140,0,255,0),transparent);transition:background 1s;
}
#s2-glow.lit{background:radial-gradient(ellipse 40% 50% at 50% 52%,rgba(140,0,255,.25),rgba(80,0,180,.08) 55%,transparent 80%)}
#s2-lightning{position:absolute;inset:0;z-index:6;pointer-events:none}

/* ══════════════════════════════════════
   PASSWORD PANEL
══════════════════════════════════════ */
#pw-panel{
  position:fixed;inset:0;z-index:50;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);backdrop-filter:blur(12px);
}
#pw-panel.show{display:flex}
.pw-card{
  position:relative;
  background:linear-gradient(160deg,rgba(6,2,14,.97),rgba(12,2,22,.98));
  border:1px solid rgba(201,168,76,.38);border-radius:4px;
  padding:32px 26px 24px;width:min(340px,92vw);
  display:flex;flex-direction:column;align-items:center;overflow:hidden;
  animation:cardIn .38s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardIn{from{transform:scale(.84) translateY(18px);opacity:0}to{transform:none;opacity:1}}
.pw-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);}
.pw-corner{position:absolute;width:12px;height:12px;border-color:var(--gold);border-style:solid}
.pw-corner.tl{top:0;right:0;border-width:1.5px 1.5px 0 0}.pw-corner.tr{top:0;left:0;border-width:1.5px 0 0 1.5px}
.pw-corner.bl{bottom:0;right:0;border-width:0 1.5px 1.5px 0}.pw-corner.br{bottom:0;left:0;border-width:0 0 1.5px 1.5px}
.pw-icon{font-size:32px;margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(201,168,76,.8));animation:iconPulse 3s ease-in-out infinite}
.pw-title{font-family:'Cinzel Decorative','Cinzel',serif;font-size:clamp(11px,2.2vw,14px);color:var(--gold2);text-shadow:0 0 12px rgba(201,168,76,.7);letter-spacing:2px;margin-bottom:3px;text-align:center;}
.pw-sub{font-size:9px;color:rgba(201,168,76,.35);letter-spacing:2px;margin-bottom:14px;text-align:center}
.pw-rule{width:100%;display:flex;align-items:center;gap:6px;margin-bottom:14px}
.pw-rl{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.pw-rd{width:5px;height:5px;background:var(--gold2);transform:rotate(45deg);box-shadow:0 0 7px var(--gold);flex-shrink:0}
.pw-input{
  width:100%;background:rgba(201,168,76,.04);border:1.5px solid rgba(201,168,76,.25);border-radius:3px;
  color:var(--gold2);font-family:'Cinzel',serif;font-size:14px;
  padding:11px 14px;outline:none;text-align:center;letter-spacing:3px;
  transition:border-color .2s,box-shadow .2s;margin-bottom:12px;
}
.pw-input:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.18)}
.pw-input::placeholder{color:rgba(201,168,76,.2);font-size:11px}
.pw-btns{display:flex;gap:8px;width:100%}
.pw-ok{flex:1;background:linear-gradient(135deg,#3d2200,#c9a84c 40%,#f5e090 60%,#c9a84c 80%,#3d2200);border:none;border-radius:3px;color:#1a0900;font-family:'Cinzel Decorative','Cinzel',serif;font-size:13px;font-weight:700;padding:10px 0;cursor:pointer;letter-spacing:2px;box-shadow:0 0 16px rgba(201,168,76,.32);}
.pw-ok:active{transform:scale(.96)}
.pw-back{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.25);border-radius:3px;color:rgba(201,168,76,.5);font-family:'Cinzel',serif;font-size:10px;padding:10px 13px;cursor:pointer;transition:all .2s;}
.pw-back:hover{background:rgba(201,168,76,.1);color:var(--gold)}
.pw-err{font-size:10px;color:#ff5544;margin-top:9px;display:none;text-align:center}
.pw-err.show{display:block;animation:errShake .35s ease}
@keyframes errShake{0%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}

/* ══════════════════════════════════════
   THUNDER MENU
══════════════════════════════════════ */
#thunder-menu{
  position:fixed;inset:0;z-index:60;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);backdrop-filter:blur(0px);
  pointer-events:none;
  transition:background .5s,backdrop-filter .5s;
}
#thunder-menu.show{
  display:flex;pointer-events:auto;
  background:rgba(0,0,0,.93);backdrop-filter:blur(10px);
}
#tm-lightning{position:absolute;inset:0;pointer-events:none;z-index:0}

.tm-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  width:min(680px,96vw);
  opacity:0;transform:translateY(24px) scale(.96);
  transition:opacity .55s ease .2s,transform .55s ease .2s;
}
#thunder-menu.show .tm-inner{opacity:1;transform:translateY(0) scale(1)}

.tm-top-deco{
  display:flex;align-items:center;gap:12px;margin-bottom:10px;
  color:rgba(201,168,76,.4);font-size:clamp(7px,1.1vw,10px);letter-spacing:6px;
}
.tm-top-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent)}

.tm-title{
  font-family:'Cinzel Decorative','Cinzel',serif;
  font-size:clamp(22px,5vw,52px);
  color:var(--gold2);letter-spacing:clamp(5px,1.5vw,16px);
  text-align:center;
  text-shadow:0 0 30px rgba(201,168,76,.9),0 0 80px rgba(201,168,76,.5),0 0 140px rgba(201,168,76,.25);
  animation:tmShine 2.2s ease-in-out infinite alternate;
  margin-bottom:8px;
}
@keyframes tmShine{
  from{text-shadow:0 0 22px rgba(201,168,76,.7),0 0 55px rgba(201,168,76,.35);}
  to{text-shadow:0 0 50px rgba(245,224,144,1),0 0 110px rgba(201,168,76,.75),0 0 200px rgba(201,168,76,.3);}
}
.tm-subtitle{
  font-size:clamp(7px,1.1vw,10px);color:rgba(201,168,76,.35);
  letter-spacing:6px;margin-bottom:clamp(18px,4vh,38px);text-align:center;
}
.tm-divider{
  width:88%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);
  box-shadow:0 0 16px rgba(201,168,76,.45);
  margin-bottom:clamp(18px,4vh,36px);
}

.tm-btns{display:flex;flex-direction:column;gap:clamp(7px,1.5vh,14px);width:100%;align-items:center}
.tm-btn{
  position:relative;width:min(540px,94vw);
  padding:clamp(13px,2.3vh,18px) clamp(22px,4vw,48px);
  background:linear-gradient(135deg,rgba(45,28,0,.92),rgba(18,10,0,.96));
  border:1px solid rgba(201,168,76,.35);
  border-top-color:rgba(245,224,144,.55);border-bottom-color:rgba(201,168,76,.18);
  color:var(--gold2);
  font-family:'Cinzel Decorative','Cinzel',serif;
  font-size:clamp(12px,1.8vw,16px);
  letter-spacing:2px;
  cursor:pointer;text-align:center;
  clip-path:polygon(18px 0%,100% 0%,calc(100% - 18px) 100%,0% 100%);
  transition:all .22s;
  text-shadow:0 0 14px rgba(201,168,76,.55);
  overflow:hidden;
  opacity:0;transform:translateX(50px);
}
#thunder-menu.show .tm-btn{opacity:1;transform:translateX(0);}
#thunder-menu.show .tm-btn:nth-child(1){transition:opacity .4s ease .3s,transform .4s ease .3s,background .22s,box-shadow .22s,color .22s;}
#thunder-menu.show .tm-btn:nth-child(2){transition:opacity .4s ease .4s,transform .4s ease .4s,background .22s,box-shadow .22s,color .22s;}
.tm-btn::before{content:'';position:absolute;top:0;left:-120%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(201,168,76,.07),transparent);transition:left .45s;}
.tm-btn:hover::before{left:120%}
.tm-btn:hover{
  background:linear-gradient(135deg,rgba(90,56,0,.98),rgba(55,33,0,.99));
  border-color:rgba(245,224,144,.75);
  box-shadow:0 0 32px rgba(201,168,76,.45),inset 0 0 22px rgba(201,168,76,.06);
  color:#fff;
}
.tm-btn:active{transform:scale(.97)}

.tm-prog-wrap{
  width:min(540px,94vw);height:2px;
  background:rgba(201,168,76,.08);
  border:1px solid rgba(201,168,76,.15);
  margin-top:clamp(16px,3.5vh,32px);overflow:hidden;
}
.tm-prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
  box-shadow:0 0 14px var(--gold);
  transition:width .05s linear;
}

/* ══════════════════════════════════════
   TRANSITIONS
══════════════════════════════════════ */
#black-cover{position:fixed;inset:0;z-index:80;background:#000;opacity:0;pointer-events:none;transition:opacity .9s;}
#black-cover.show{opacity:1;pointer-events:auto}
#purple-cover{position:fixed;inset:0;z-index:79;background:radial-gradient(ellipse at 50% 50%,#28004c,#0a0020,#000);opacity:0;pointer-events:none;transition:opacity 1.5s ease;}
#purple-cover.show{opacity:1;pointer-events:auto}
.wave-ring{position:fixed;pointer-events:none;border-radius:50%;border:2px solid rgba(201,168,76,.55);transform:translate(-50%,-50%) scale(0);animation:waveRing .9s ease-out forwards;z-index:200;}
@keyframes waveRing{to{transform:translate(-50%,-50%) scale(4.5);opacity:0}}
</style>
</head>
<body>

<div id="black-cover"></div>
<div id="purple-cover"></div>

<!-- ════ SCREEN 1 ════ -->
<div id="screen1">
  <div class="s1-candle" style="width:80px;height:80px;bottom:36%;left:20%;--cf:2.1s"></div>
  <div class="s1-candle" style="width:54px;height:54px;bottom:34%;left:27%;--cf:2.7s"></div>
  <div class="s1-candle" style="width:80px;height:80px;bottom:36%;right:20%;--cf:1.9s"></div>
  <div class="s1-candle" style="width:54px;height:54px;bottom:34%;right:27%;--cf:2.4s"></div>
  <div class="s1-fog" style="bottom:18%;--fd:20s"></div>
  <div class="s1-fog" style="bottom:3%;--fd:16s;opacity:.65"></div>
  <svg id="s1-castle" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" fill="none">
    <rect x="0" y="460" width="900" height="60" fill="#0d0a04"/>
    <rect x="250" y="260" width="400" height="200" fill="#100c04"/>
    <rect x="360" y="120" width="180" height="200" fill="#0f0b03"/>
    <polygon points="450,30 330,140 570,140" fill="#1a1204"/>
    <path d="M400 460 Q400 390 450 390 Q500 390 500 460" fill="rgba(0,0,0,.8)" stroke="rgba(201,168,76,.2)" stroke-width="1.5"/>
  </svg>
  <canvas id="s1-sakura"></canvas>
  <div class="gate-ring-wrap" id="s1-gate-btn">
    <div class="ring-pulse"></div><div class="ring-outer"></div><div class="ring-outer2"></div>
    <div class="ring-inner"><div class="gate-icon">⛩️</div></div>
  </div>
</div>

<!-- ════ LOADER OVERLAY ════ -->
<div id="loader-overlay">
  <div id="loader-title">ثواني يا شاطر 😎</div>
  <div id="loader-wrap">
    <div id="loader-bar"></div>
  </div>
  <div id="loader-pct">0%</div>
</div>

<!-- ════ SCREEN 2 ════ -->
<div id="screen2">
  <div id="s2-bg">
    <svg id="s2-castle" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" fill="none">
      <defs>
        <radialGradient id="skyG" cx="50%" cy="0%" r="90%"><stop offset="0%" stop-color="#5a0000"/><stop offset="100%" stop-color="#000"/></radialGradient>

<script>
'use strict';

/* ══════════════════════════════════
   SOUND MANAGER
══════════════════════════════════ */
var SoundManager = {
  playClick: function() {
    var kps = document.getElementById('sfx-kps');
    if (kps) {
      kps.currentTime = 0;
      kps.play().catch(function(){});
    }
  },
  playMusic: function() {
    var music = document.getElementById('sfx-music');
    if (music) {
      music.volume = 0.55;
      music.play().catch(function(){});
    }
  }
};

/* ══════════════════════════════════
   SCREEN 1 — ساكورا والتحميل المطور
══════════════════════════════════ */
(function(){
  var cv=document.getElementById('s1-sakura'),ctx=cv.getContext('2d'),W,H,petals=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function mkP(){return{x:Math.random()*W,y:-10,vx:(Math.random()-.5)*.8,vy:.4+Math.random()*.9,angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.04,r:2+Math.random()*4,a:Math.random()*.6+.2};}
  for(var i=0;i<35;i++){var p=mkP();p.y=Math.random()*H;petals.push(p);}
  (function loop(){
    ctx.clearRect(0,0,W,H);
    if(petals.length<55&&Math.random()<.25) petals.push(mkP());
    petals.forEach(function(p,i){
      p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;
      if(p.y>H+10||p.x<-20||p.x>W+20) petals[i]=mkP();
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);
      ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*.55,0,0,Math.PI*2);
      ctx.fillStyle='rgba(255,200,220,'+p.a+')';ctx.fill();ctx.restore();
    });
    requestAnimationFrame(loop);
  })();

  document.getElementById('s1-gate-btn').addEventListener('click',function(e){
    SoundManager.playClick();
    var wr=document.createElement('div');wr.className='wave-ring';
    wr.style.cssText='left:'+e.clientX+'px;top:'+e.clientY+'px;width:60px;height:60px;margin-left:-30px;margin-top:-30px;';
    document.body.appendChild(wr);setTimeout(function(){wr.remove();},950);
    
    var loaderOverlay = document.getElementById('loader-overlay');
    var loaderBar = document.getElementById('loader-bar');
    var loaderPct = document.getElementById('loader-pct');
    loaderOverlay.classList.add('show');
    
    var progress = 0;
    var duration = 2500;
    var intervalTime = 20;
    var step = (100 / (duration / intervalTime));
    
    var loadIv = setInterval(function(){
      progress += step;
      if(progress >= 100){
        progress = 100;
        clearInterval(loadIv);
        document.getElementById('screen1').classList.add('fade-out');
        loaderOverlay.style.display = 'none';
        
        setTimeout(function(){
          var s2=document.getElementById('screen2');s2.classList.add('show');
          requestAnimationFrame(function(){requestAnimationFrame(function(){
            s2.style.transition='opacity .8s';s2.style.opacity='1';Screen2.init();
          });});
        },300);
      }
      loaderBar.style.width = progress + '%';
      loaderPct.innerText = Math.floor(progress) + '%';
    }, intervalTime);
  });
})();

/* ══════════════════════════════════
   THUNDER MENU
══════════════════════════════════ */
var TM=(function(){
  var cv=document.getElementById('tm-lightning'),ctx=cv?cv.getContext('2d'):null;
  var W,H,bolts=[],active=false,barIv=null;
  function resize(){if(!cv)return;W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function spawnBolt(){
    var pts=[],x=Math.random()*W,y=0;pts.push({x:x,y:y});
    for(var i=0;i<9;i++){x+=(Math.random()-.5)*130;y+=H/9+Math.random()*45;pts.push({x:x,y:y});}
    var c=Math.random()>.45?'201,168,76':'245,224,144';
    return{pts:pts,life:1,decay:.06+Math.random()*.09,color:c};
  }
  function loop(){
    if(!active||!ctx)return;ctx.clearRect(0,0,W,H);
    if(Math.random()<.16) bolts.push(spawnBolt());
    for(var i=bolts.length-1;i>=0;i--){
      var b=bolts[i];ctx.beginPath();ctx.moveTo(b.pts[0].x,b.pts[0].y);
      for(var j=1;j<b.pts.length;j++) ctx.lineTo(b.pts[j].x,b.pts[j].y);
      ctx.strokeStyle='rgba('+b.color+','+b.life+')';ctx.lineWidth=1.5+b.life*2.5;ctx.stroke();b.life-=b.decay;if(b.life<=0)bolts.splice(i,1);
    }
    requestAnimationFrame(loop);
  }
  function show(){
    active=true;bolts=[];document.getElementById('thunder-menu').classList.add('show');requestAnimationFrame(loop);
    var bar=document.getElementById('tm-bar'),p=0;if(barIv) clearInterval(barIv);
    barIv=setInterval(function(){p+=.33;if(p>=100){p=100;clearInterval(barIv);}bar.style.width=p+'%';},16);
  }
  function hide(){
    active=false;if(barIv)clearInterval(barIv);document.getElementById('thunder-menu').classList.remove('show');
    if(ctx)ctx.clearRect(0,0,W,H);bolts=[];document.getElementById('tm-bar').style.width='0%';
  }
  function pick(key){
    hide();
    if(key==='enter') {
      Screen2.openGate();
    } else if(key==='index2') {
      window.location.href = 'enter.js';
    }
  }
  return{show:show,hide:hide,pick:pick};
})();

/* ══════════════════════════════════
   SCREEN 2 — البوابة ثلاثية الأبعاد
══════════════════════════════════ */
window.Screen2=(function(){
  var PASSWORD='الظلام المتجمد';
  var scene,camera,renderer,doorL,doorR;
  var doorsOpening=false,doorAngle=0;
  var OPEN_ANGLE=Math.PI / 2,DOOR_SPEED=Math.PI/(5*60); 
  var redLights=[],backGlow,threeInited=false;

  function initEmbers(){
    var cv=document.getElementById('s2-embers');if(!cv)return;
    var ctx=cv.getContext('2d'),W,H,sparks=[];
    function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
    resize();window.addEventListener('resize',resize);
    function mk(){return{x:Math.random()*W,y:H+10,vx:(Math.random()-.5)*1.2,vy:-(1+Math.random()*2.5),life:1,s:1.5+Math.random()*2.5};}
    for(var i=0;i<30;i++){var sp=mk();sp.y=Math.random()*H;sparks.push(sp);}
    (function loop(){
      ctx.clearRect(0,0,W,H);if(sparks.length<60&&Math.random()<.4) sparks.push(mk());
      for(var i=sparks.length-1;i>=0;i--){
        var s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.life-=.007;
        ctx.beginPath();ctx.arc(s.x,s.y,s.s*s.life,0,Math.PI*2);ctx.fillStyle='rgba(150,0,255,'+(s.life*.8)+')';ctx.fill();
        if(s.life<=0||s.y<-10)sparks.splice(i,1);
      }
      requestAnimationFrame(loop);
    })();
  }

  var glCV=document.getElementById('s2-lightning'),glCTX=glCV?glCV.getContext('2d'):null;
  var glW,glH,glBolts=[],glActive=false;
  function resizeGL(){if(!glCV)return;glW=glCV.width=window.innerWidth;glH=glCV.height=window.innerHeight;}
  resizeGL();window.addEventListener('resize',resizeGL);
  function spawnBolt(){
    var cx=glW/2,cy=glH*.48,a=-Math.PI/2+(Math.random()-.5)*Math.PI*1.6;
    var pts=[{x:cx,y:cy}],x=cx,y=cy;
    for(var i=0;i<10;i++){x+=Math.cos(a)*30+(Math.random()-.5)*50;y+=Math.sin(a)*30+(Math.random()-.5)*30;pts.push({x:x,y:y});}
    return{pts:pts,life:1,decay:.08+Math.random()*.1,color:'255,0,0'};
  }
  function glLoop(){
    if(!glActive||!glCTX){if(glCTX)glCTX.clearRect(0,0,glW,glH);return;}
    glCTX.clearRect(0,0,glW,glH);if(Math.random()<.25) glBolts.push(spawnBolt());
    for(var i=glBolts.length-1;i>=0;i--){
      var b=glBolts[i];glCTX.beginPath();glCTX.moveTo(b.pts[0].x,b.pts[0].y);
      for(var j=1;j<b.pts.length;j++) glCTX.lineTo(b.pts[j].x,b.pts[j].y);
      glCTX.strokeStyle='rgba('+b.color+','+b.life+')';glCTX.lineWidth=3;
      glCTX.shadowColor='rgba(255,0,0,1)';glCTX.shadowBlur=20;glCTX.stroke();glCTX.shadowBlur=0;
      b.life-=b.decay;if(b.life<=0)glBolts.splice(i,1);
    }
    requestAnimationFrame(glLoop);
  }
  function startGL(){if(glActive||!glCTX)return;glActive=true;glBolts=[];requestAnimationFrame(glLoop);}
  function stopGL(){glActive=false;glBolts=[];if(glCTX)glCTX.clearRect(0,0,glW,glH);}

  function initThree(){
    if(threeInited||!window.THREE)return;threeInited=true;
    var canvas=document.getElementById('three-canvas');if(!canvas)return;
    renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    scene=new THREE.Scene();
    camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,.01,200);
    camera.position.set(0,0,7.5);
    scene.add(new THREE.AmbientLight(0x110022,2.5));
    var dL1=new THREE.DirectionalLight(0x6600aa,3);dL1.position.set(0,2,5);scene.add(dL1);
    backGlow=new THREE.PointLight(0xaa44ff,0,18);backGlow.position.set(0,0,-2);scene.add(backGlow);
    function resizeR(){renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();}
    window.addEventListener('resize',resizeR);resizeR();
    
    var ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
    canvas.addEventListener('click',function(e){
      if(doorsOpening)return;
      mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
      ray.setFromCamera(mouse,camera);if(ray.intersectObjects(scene.children,true).length>0) onGateClick();
    });

    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    s.onload=loadGLB;s.onerror=buildFallback;document.head.appendChild(s);
    
    (function animate(){
      requestAnimationFrame(animate);
      if(doorsOpening){
        doorAngle=Math.min(doorAngle+DOOR_SPEED,OPEN_ANGLE);
        if(doorL) { doorL.rotation.y = doorAngle; } 
        if(doorR) { doorR.rotation.y = doorAngle; }
        if(backGlow)backGlow.intensity=(doorAngle/OPEN_ANGLE)*5;
      }
      renderer.render(scene,camera);
    })();
  }

  function loadGLB(){
    if(!window.THREE||!window.THREE.GLTFLoader){buildFallback();return;}
    new THREE.GLTFLoader().load('GggG.glb',function(gltf){
      var model=gltf.scene;
      model.traverse(function(c){if(c.name==='Door_L')doorL=c;if(c.name==='Door_R')doorR=c;});
      var box=new THREE.Box3().setFromObject(model),sz=box.getSize(new THREE.Vector3()),cn=box.getCenter(new THREE.Vector3());
      var sc=4.5/Math.max(sz.x,sz.y,sz.z);model.scale.setScalar(sc);model.position.set(-cn.x*sc,-cn.y*sc,-cn.z*sc);scene.add(model);
    },null,buildFallback);
  }

  function buildFallback(){
    var mat=new THREE.MeshStandardMaterial({color:0x150025,roughness:.25,metalness:.9,side:THREE.DoubleSide});
    var frm=new THREE.MeshStandardMaterial({color:0x3a0055,roughness:.1,metalness:1,side:THREE.DoubleSide});
    function aB(g,m,x,y,z){var mesh=new THREE.Mesh(g,m);mesh.position.set(x,y,z);scene.add(mesh);return mesh;}
    aB(new THREE.BoxGeometry(3.1,.18,.14),frm,0,1.82,.01);aB(new THREE.BoxGeometry(3.1,.18,.14),frm,0,-1.82,.01);
    aB(new THREE.BoxGeometry(.18,3.64,.14),frm,-1.46,0,.01);aB(new THREE.BoxGeometry(.18,3.64,.14),frm,1.46,0,.01);
    
    var gL=new THREE.BoxGeometry(1.3,3.6,.09);gL.translate(.65,0,-.15);
    doorL=new THREE.Mesh(gL,mat.clone());doorL.position.set(-1.3,0,.07);scene.add(doorL);
    var gR=new THREE.BoxGeometry(1.3,3.6,.09);gR.translate(-.65,0,-.15);
    doorR=new THREE.Mesh(gR,mat.clone());doorR.position.set(1.3,0,.07);scene.add(doorR);
  }

  function onGateClick(){
    SoundManager.playClick();
    startGL();
    setTimeout(function(){stopGL();TM.show();},900);
  }

  function openGate(){
    var pw=document.getElementById('pw-panel');pw.classList.add('show');
    setTimeout(function(){var i=document.getElementById('pw-input');if(i)i.focus();},300);
  }
  function closePW(){
    document.getElementById('pw-panel').classList.remove('remove');
    document.getElementById('pw-panel').classList.remove('show');
    var i=document.getElementById('pw-input');if(i)i.value='';
  }
  function checkPW(){
    var inp=document.getElementById('pw-input');if(!inp)return;
    if(inp.value.trim()===PASSWORD){closePW();enterMain();}
    else{
      var e=document.getElementById('pw-err');
      if(e){e.classList.add('show');setTimeout(function(){e.classList.remove('show');},3000);}
      startGL();setTimeout(stopGL,900);
    }
  }

  function enterMain(){
    doorsOpening=true;doorAngle=0;
    var glow=document.getElementById('s2-glow');if(glow)glow.classList.add('lit');
    startGL();
    var sfx=document.getElementById('sfx-open');if(sfx){sfx.currentTime=0;sfx.play().catch(function(){});}

    setTimeout(function(){
      stopGL();if(glow)glow.classList.remove('lit');
      var pc=document.getElementById('purple-cover'),bc=document.getElementById('black-cover');
      pc.classList.add('show');
      setTimeout(function(){
        bc.classList.add('show');
        setTimeout(function(){
          var s2=document.getElementById('screen2');if(s2) { s2.classList.add('fade-out'); s2.style.display='none'; }
          // هنا يتم استدعاء الكود الخارجي المسار المخصص لزر الدخول
          var s = document.createElement('script');
          s.src = 'enter.js';
          document.head.appendChild(s);
          SoundManager.playMusic();
          setTimeout(function(){bc.classList.remove('show');setTimeout(function(){pc.classList.remove('show');},600);},500);
        },400);
      },500);
    }, 5000); 
  }

  function init(){initEmbers();initThree();}
  return{init:init,openGate:openGate,closePW:closePW,checkPW:checkPW,onGateClick:onGateClick};
})();
</script>
